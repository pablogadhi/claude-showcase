services:
  db:
    image: postgres:16-alpine
    container_name: url_shortener_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-urluser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-urlpass}
      POSTGRES_DB: ${POSTGRES_DB:-urlshortener}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-urluser} -d ${POSTGRES_DB:-urlshortener}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: url_shortener_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-urluser}:${POSTGRES_PASSWORD:-urlpass}@db:5432/${POSTGRES_DB:-urlshortener}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app/src:/app/src

volumes:
  postgres_data:
    driver: local
